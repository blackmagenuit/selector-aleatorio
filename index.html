<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🎡 Ruleta de Actividades</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Confetti -->
  <div id="confettiLayer" aria-hidden="true"></div>

  <!-- All done overlay -->
  <div id="allDoneOverlay" class="alldone-overlay hidden" role="dialog" aria-modal="true">
    <div class="alldone-card">
      <img src="https://i.redd.it/xy9rx27avqw31.gif"
           alt="Charmander bailando" class="charmander" />
      <h2 data-i18n="allDoneTitle">¡Lo lograste! 🎉</h2>
      <p data-i18n="allDoneMsg">Completaste todo. Charmander está bailando por vos.</p>
      <button id="allDoneClose" class="btn primary" type="button" data-i18n="allDoneClose">Cerrar</button>
    </div>
  </div>

  <main class="wrap">
    <header class="header">
      <div class="header-top">
        <h1 data-i18n="h1">🎡 Ruleta de Actividades</h1>
        <button id="langBtn" class="btn lang-btn" type="button" data-i18n="langBtn">🌐 EN</button>
      </div>
      <p class="subtitle" data-i18n="subtitle">Solo dejate llevar por la vida</p>
    </header>

    <!-- Carga -->
    <section class="card load-card">
      <div class="row">
        <label class="file-btn">
          <input id="fileInput" type="file" accept=".txt,text/plain" />
          <span data-i18n="fileBtn">📄 Subir TXT</span>
        </label>
        <button id="loadDemo" class="btn secondary" type="button">✨ Demo</button>
        <button id="resetAll" class="btn danger" type="button" data-i18n="resetAll">🗑 Resetear</button>
      </div>
      <div class="stats">
        <div class="stat-item">
          <span class="stat-num" id="pendingCount">0</span>
          <span class="stat-label" data-i18n="pendingLabel">Pendientes</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num done-num" id="doneCount">0</span>
          <span class="stat-label" data-i18n="doneLabel">Completadas 🏆</span>
        </div>
      </div>

      <!-- Carga manual -->
      <div class="manual-row">
        <input id="manualInput" class="manual-input" type="text"
               data-i18n-placeholder="manualPlaceholder"
               placeholder="Escribí una actividad y presioná ＋" />
        <button id="manualAdd" class="btn success" type="button" aria-label="Agregar">＋</button>
      </div>
    </section>

    <!-- Ruleta -->
    <section class="card wheel-card">
      <div class="wheel-area">
        <!-- Puntero -->
        <div class="pointer-wrap" aria-hidden="true">
          <div class="pointer-arrow"></div>
        </div>
        <canvas id="wheelCanvas" width="420" height="420"></canvas>
      </div>

      <!-- Banner de resultado -->
      <div id="resultBanner" class="result-banner hidden">
        <p class="result-label" data-i18n="resultLabel">¡Te tocó!</p>
        <p id="resultText" class="result-text"></p>
      </div>

      <!-- Botones -->
      <div class="actions row">
        <button id="spinBtn" class="btn primary spin-btn" type="button" disabled data-i18n="spinBtn">🎰 Girar</button>
        <button id="doneBtn" class="btn success" type="button" disabled data-i18n="doneBtn">✅ ¡Listo!</button>
        <button id="skipBtn" class="btn secondary" type="button" disabled data-i18n="skipBtn">🔄 Otra</button>
        <button id="undoBtn" class="btn ghost" type="button" disabled data-i18n="undoBtn">↩ Deshacer</button>
      </div>

      <!-- Mensaje motivacional -->
      <div id="motivational" class="motivational" aria-live="polite"></div>
    </section>

    <!-- Listas -->
    <section class="grid">
      <section class="card list-card">
        <h2 data-i18n="pendingTitle">⏳ Pendientes</h2>
        <ul id="pendingList" class="list"></ul>
      </section>
      <section class="card list-card">
        <h2 data-i18n="doneTitle">🏆 Completadas</h2>
        <ul id="doneList" class="list"></ul>
      </section>
    </section>

    <footer class="footer">
      <small data-i18n="tip">Tip: una actividad por línea en el TXT. Líneas vacías se ignoran.</small>
      <small class="author">by blackmagenuit</small>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
